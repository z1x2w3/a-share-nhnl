name: Daily NH-NL Collector

on:
  schedule:
    - cron: "5 7 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Install dependencies
        run: |
          pip install akshare==1.18.63 pandas==3.0.3 matplotlib

      - name: Run script
        run: |
          python collect.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add nhnl_history.csv nhnl_chart.png
          git commit -m "📈 update nhnl data $(date +'%Y-%m-%d')" || echo "No changes"
          git push
